name: Deploy NEON-FLOW

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # 前端部署到 GitHub Pages
  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ runner.os }}-${{ hashFiles('frontend/package.json') }}

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build
        run: cd frontend && npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          cname: neon-flow.pages.dev

  # Worker 部署通过 Cloudflare Pages (内建 CI)
  # 在 Cloudflare Dashboard 设置:
  #   - Build command: npx wrangler pages deploy
  #   - Environment variables: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
  #   - Build output目录: worker (wrangler 会自动处理)